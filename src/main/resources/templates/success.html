<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Feedback Submitted</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f5f5f5;
            margin: 0;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            padding: 15px 40px;
            background: #f8f6f4;
        }

        .logo {
            font-weight: bold;
            font-size: 18px;
        }

        /* CENTER BOX */
        .container {
            text-align: center;
            margin-top: 80px;
        }

        .circle {
            width: 90px;
            height: 90px;
            background: #d1fae5;
            border-radius: 50%;
            margin: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: green;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            margin-top: 20px;
        }

        p {
            color: #666;
            max-width: 500px;
            margin: 10px auto;
        }

        /* COUNTDOWN */
        .count {
            margin: 20px auto;
            width: 60px;
            height: 60px;
            border: 4px solid #c2410c;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #c2410c;
        }

        /* BUTTON */
        .btn {
            background: #2d1b0f;
            color: white;
            padding: 12px 25px;
            border-radius: 25px;
            border: none;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">EduPulse</div>
    <div>Staff Login</div>
</div>

<!-- CONTENT -->
<div class="container">

    <div>🎉 🎊 🎓</div>

    <div class="circle">✔</div>

    <h1>Feedback Submitted!</h1>

    <p>
        Thank you for taking the time to share your feedback.<br>
        Your responses help improve teaching quality and curriculum.
    </p>

    <div class="count" id="count">5</div>

    <p>Redirecting to home...</p>

    <button class="btn" onclick="goHome()">↻ Go to Home Now</button>

</div>

<script>
let time = 5;

let timer = setInterval(() => {
    time--;
    document.getElementById("count").innerText = time;

    if (time === 0) {
        clearInterval(timer);
        window.location.href = "/";
    }
}, 1000);

function goHome() {
    window.location.href = "/";
}
</script>

</body>
</html>
