<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Review Feedback</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f6f3ef;
            margin: 0;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            padding: 15px 40px;
            background: #f8f6f4;
        }

        .logo {
            font-weight: bold;
        }

        .btn {
            background: #2c1a0f;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
        }

        /* CONTAINER */
        .container {
            max-width: 900px;
            margin: 30px auto;
        }

        /* STEP */
        .stepper {
            display: flex;
            gap: 10px;
            background: white;
            padding: 15px;
            border-radius: 15px;
            justify-content: center;
        }

        .step {
            padding: 8px 12px;
            border-radius: 20px;
            background: #eee;
        }

        .done {
            background: #16a34a;
            color: white;
        }

        .active {
            background: #c2410c;
            color: white;
        }

        /* CARD */
        .card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
        }

        .title {
            font-size: 14px;
            color: #c2410c;
            margin-bottom: 10px;
        }

        textarea {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #ddd;
        }

        /* OPTIONS */
        .options label {
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid #ccc;
            margin-right: 8px;
            cursor: pointer;
        }

        .options input {
            display: none;
        }

        .options input:checked + label {
            background: #c2410c;
            color: white;
        }

        /* BUTTONS */
        .actions {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        .prev {
            background: #eee;
            padding: 10px 20px;
            border-radius: 20px;
        }

        .submit {
            background: #16a34a;
            color: white;
            padding: 12px 25px;
            border-radius: 25px;
            border: none;
            font-weight: bold;
        }

    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">EduPulse</div>
    <div class="btn">Staff Login</div>
</div>

<div class="container">

    <!-- STEPPER -->
    <div class="stepper">
        <div class="step done">✓ Kumar</div>
        <div class="step done">✓ Rao</div>
        <div class="step done">✓ Patel</div>
        <div class="step done">✓ Sharma</div>
        <div class="step active">Review</div>
    </div>

    <!-- COMMENT -->
    <form action="/submit" method="post">
    <input type="hidden" name="token" th:value="${token}">

        <div class="card">
            <div class="title">OVERALL DEPARTMENT FEEDBACK</div>
            <textarea name="comment"
                placeholder="Share thoughts on infrastructure, labs, curriculum..."></textarea>
        </div>

        <!-- RATING -->
        <div class="card">
            <div class="title">OVERALL DEPARTMENT RATING</div>

            <div class="options">
                <input type="radio" name="rating" value="4" id="r1">
                <label for="r1">Excellent</label>

                <input type="radio" name="rating" value="3" id="r2">
                <label for="r2">Good</label>

                <input type="radio" name="rating" value="2" id="r3">
                <label for="r3">Average</label>

                <input type="radio" name="rating" value="1" id="r4">
                <label for="r4">Needs Improvement</label>
            </div>
        </div>

        <!-- BUTTONS -->
        <div class="actions">
            <div class="prev">← Previous</div>
            <button class="submit">✔ Submit All Feedback</button>
        </div>

    </form>

</div>

</body>
</html>
